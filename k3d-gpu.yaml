apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: galaxy-local
servers: 1
agents: 0
ports:
  - port: 8080:80
    nodeFilters:
      - loadbalancer
  - port: 8443:443
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
      # Allow GPU device plugin to work inside k3s
      - arg: --kubelet-arg=feature-gates=DevicePlugins=true
        nodeFilters:
          - server:*
  kubeconfig:
    updateDefaultKubeconfig: true
    switchCurrentContext: true
  runtime:
    gpuRequest: all   # pass all GPUs from host into the k3d node container
