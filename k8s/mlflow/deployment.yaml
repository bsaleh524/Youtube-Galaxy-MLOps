apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: galaxy-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.12.1
        command:
          - mlflow
          - server
          - --host=0.0.0.0
          - --port=5000
          - --backend-store-uri=sqlite:///mlflow/mlruns.db
          - --default-artifact-root=/mlflow/artifacts
          # In production with Oracle Object Storage:
          # - --default-artifact-root=s3://galaxy-artifacts/mlflow
        ports:
        - containerPort: 5000
        resources:
          requests: { memory: 512Mi, cpu: 250m }
          limits:   { memory: 1Gi,   cpu: 500m }
        volumeMounts:
        - name: mlflow-data
          mountPath: /mlflow
      volumes:
      - name: mlflow-data
        persistentVolumeClaim:
          claimName: mlflow-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-pvc
  namespace: galaxy-pipeline
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: galaxy-pipeline
spec:
  selector:
    app: mlflow
  ports:
  - port: 5000
    targetPort: 5000
